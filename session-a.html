<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #212121; --sidebar: #171717; --input-bg: #2f2f2f;
    --border: #3f3f3f; --text: #ececec; --text-muted: #8e8ea0;
    --hover: #2a2a2a; --accent: #10a37f;
  }
  body { font-family: "Söhne", ui-sans-serif, system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 208px; background: var(--sidebar); display: flex; flex-direction: column; padding: 8px; flex-shrink: 0; }
  .sidebar-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 6px; margin-bottom: 4px; }
  .sidebar-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
  .new-chat-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; transition: background .15s, color .15s; }
  .new-chat-btn:hover { background: var(--hover); color: var(--text); }
  .sidebar-section { font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 12px 8px 4px; text-transform: uppercase; letter-spacing: .05em; }
  .chat-item { padding: 8px 10px; border-radius: 8px; font-size: 13.5px; color: var(--text-muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background .15s, color .15s; }
  .chat-item:hover { background: var(--hover); color: var(--text); }
  .chat-item.active { background: var(--hover); color: var(--text); }
  .sidebar-footer { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border); }
  .user-profile { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .user-profile:hover { background: var(--hover); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #7c6af7, #4f8ef7); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .model-selector { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: background .15s; user-select: none; }
  .model-selector:hover { background: var(--hover); }
  .model-selector svg { width: 14px; height: 14px; color: var(--text-muted); }

  /* MESSAGES */
  .messages { flex: 1; overflow-y: auto; padding: 20px 0 10px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .message-wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  .message { display: flex; gap: 16px; padding: 14px 0; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg-icon { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .msg-icon.gpt { background: #fff; color: #000; }
  .msg-icon.user { background: linear-gradient(135deg, #7c6af7, #4f8ef7); color: #fff; }
  .msg-content { flex: 1; font-size: 15px; line-height: 1.75; color: var(--text); }
  .user-message { justify-content: flex-end; }
  .user-message .msg-icon { order: 2; }
  .user-message .msg-content { order: 1; }
  .user-bubble { background: #2f2f2f; padding: 10px 14px; border-radius: 16px 16px 4px 16px; display: inline-block; max-width: 80%; text-align: right; }

  .msg-content h2 { font-size: 17px; font-weight: 700; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
  .msg-content h3 { font-size: 15px; font-weight: 700; margin: 12px 0 4px; }
  .msg-content p { margin: 6px 0; }
  .msg-content ul { padding-right: 20px; margin: 6px 0; }
  .msg-content li { margin: 3px 0; }
  .msg-content strong { font-weight: 700; color: #fff; }
  .msg-content code { background: #1a1a1a; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; font-family: "Courier New", monospace; font-size: 14px; color: #e8d44d; }
  .msg-content .block-code { display: block; margin: 8px 0; padding: 10px 14px; }
  .msg-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* QUESTION CARD */
  .question-card {
    background: linear-gradient(135deg, rgba(16,163,127,.12), rgba(16,163,127,.05));
    border: 1px solid rgba(16,163,127,.35);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
  .question-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .question-label svg { width: 13px; height: 13px; }
  .question-text { font-size: 15px; color: #e0e0e0; font-weight: 500; line-height: 1.5; }

  /* ANSWER BOX — shown after user responds to a question */
  .answer-reveal {
    background: rgba(255,255,255,.04);
    border-right: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin: 8px 0;
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
    animation: fadeIn .25s ease;
  }
  .answer-reveal strong { color: var(--accent); }

  /* CURSOR */
  .cursor { display: inline-block; width: 2px; height: 15px; background: var(--text); margin-right: 1px; vertical-align: middle; animation: blink .7s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* THINKING */
  .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .thinking span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .thinking span:nth-child(2) { animation-delay: .2s; }
  .thinking span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* ACTION BUTTONS */
  .msg-actions { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity .2s; }
  .message:hover .msg-actions { opacity: 1; }
  .msg-actions button { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 4px; transition: background .15s, color .15s; }
  .msg-actions button:hover { background: var(--hover); color: var(--text); }

  /* INPUT */
  .input-area { padding: 16px 24px 20px; flex-shrink: 0; }
  .input-wrap { max-width: 760px; margin: 0 auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: flex-end; gap: 8px; padding: 10px 14px; transition: border-color .2s; }
  .input-wrap:focus-within { border-color: #555; }
  .input-wrap textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.6; resize: none; max-height: 200px; min-height: 24px; direction: rtl; }
  .input-wrap textarea::placeholder { color: var(--text-muted); }
  .send-btn { background: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, opacity .15s; opacity: .3; }
  .send-btn.active { opacity: 1; }
  .send-btn:hover.active { background: #e0e0e0; }
  .send-btn svg { width: 16px; height: 16px; color: #000; }
  .input-note { text-align: center; font-size: 11.5px; color: var(--text-muted); margin-top: 10px; max-width: 760px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <svg width="24" height="24" viewBox="0 0 41 41" fill="none"><path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.31 10.079 10.079 0 00-9.612 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.31 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.813z" fill="currentColor"/></svg>
      AI Assistant
    </div>
    <button class="new-chat-btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg></button>
  </div>
  <div class="chat-item active">מערכת גלגלות</div>
  <div class="sidebar-section">היום</div>
  <div class="chat-item">שאלה על מכונות פשוטות</div>
  <div class="chat-item">הסבר על כוח ועבודה</div>
  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="avatar">מ</div>
      <div style="font-size:13.5px;font-weight:500">משתמש</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="model-selector">
      AI Assistant
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div></div>
  </div>

  <div class="messages" id="messages">
    <div class="message-wrap" id="msg-container"></div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="שלח הודעה..." rows="1"
        oninput="autoResize(this);toggleSend();"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="input-note">סוכן בינה מלאכותית עשוי לטעות. בדוק מידע חשוב.</div>
  </div>
</div>

<script>
// ─── SCRIPT ────────────────────────────────────────────────────────────────

const GPT_ICON = `<svg width="16" height="16" viewBox="0 0 41 41" fill="none"><path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.31 10.079 10.079 0 00-9.612 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.31 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.813z" fill="currentColor"/></svg>`;

// Each "segment" is either text to type, or a question that waits for user input before continuing.
// type: 'text' | 'question'
// For questions: after the user sends ANY message, we show the answer and continue.

const SEGMENTS = [
  {
    type: 'text',
    content: `אני סוכן בינה מלאכותית שמטרתו לספק הסבר מושגי ברור, יחד עם הבנה מכנית ויכולת יישום לפתרון בעיות.\n\nנבחן את **מערכת הגלגלות (Pulley System)** משלושה שלבים:\n\n- העיקרון המכני\n- הבנת המנגנון\n- יישום בפתרון בעיות`
  },
  {
    type: 'text',
    content: `## 1. העיקרון המכני\n\nנחשוב על מצב פשוט.\n\nאתה צריך להרים קופסה כבדה לגובה של מטר. אם אתה מרים אותה ישירות ביד — אתה מפעיל כוח כלפי מעלה השווה למשקל שלה.\n\nעכשיו נניח שמתקינים גלגלת בתקרה והחבל עובר מעליה.`
  },
  {
    type: 'question',
    question: 'אם אתה מושך את החבל כלפי מטה, מה יקרה לקופסה?',
    answer: 'הקופסה **תעלה**. מכאן מגיע העיקרון הראשון: גלגלת יכולה **לשנות את כיוון הכוח**.'
  },
  {
    type: 'text',
    content: `## 2. הבנת המנגנון\n\nנבחן מצב נוסף.\n\nנניח שמשקל של **200 N** תלוי על חבל אחד — כמה כוח צריך להפעיל כדי להחזיק אותו? **200 N**.\n\nעכשיו דמיין שהמשקל נתמך על ידי **שני מקטעי חבל**.`
  },
  {
    type: 'question',
    question: 'אם שני חבלים מחזיקים את המשקל, איך לדעתך מתחלק העומס?',
    answer: 'העומס **מתחלק בין החבלים** — כל חבל נושא חצי מהמשקל.\n\nלכן הכוח הדרוש: `F = W / 2`\n\nזה העיקרון של **גלגלת ניידת**.'
  },
  {
    type: 'text',
    content: `ננסה לחשוב על מצב נוסף.\n\nמשקל של **300 N** מוחזק על ידי **3 חבלים**.`
  },
  {
    type: 'question',
    question: 'כמה כוח צריך להפעיל?',
    answer: 'נשתמש בכלל הכללי: `F = W / n`\n\n`F = 300 / 3 = **100 N**`'
  },
  {
    type: 'text',
    content: `## 3. יישום בפתרון בעיות\n\nאליסה מרימה קופסה **ביד** לגובה של 2 מטרים. בוריס משתמש ב**מערכת גלגלות** כדי להרים את אותה קופסה לאותו גובה.`
  },
  {
    type: 'question',
    question: 'מי מהם ביצע יותר עבודה?',
    answer: 'העבודה מחושבת לפי: `Work = Force × Distance`\n\nאבל להרמת גוף לגובה נדרשת אנרגיה של: `PE = mgh`\n\nהעבודה תלויה רק במשקל ובגובה — ולכן **שניהם ביצעו אותה עבודה** בדיוק.'
  },
  {
    type: 'text',
    content: `נבחן גם את השפעת החיכוך.\n\nאם יש גלגלת משומנת היטב וגלגלת אחרת חלודה — איזו תדרוש פחות כוח?\n\nהגלגלת המשומנת תדרוש פחות כוח, משום שחיכוך קטן יותר.\n\n---\n\n**שאלת בדיקה אחרונה:**\n\nמשקל של **400 N** מוחזק על ידי מערכת שבה **4 חבלים** תומכים במשקל.`
  },
  {
    type: 'question',
    question: 'כמה כוח צריך להפעיל? נסה לחשב.',
    answer: '`F = 400 / 4 = **100 N**` ✓\n\nמצוין! עברת על כל שלושת העקרונות של מערכת הגלגלות. אתה מוכן לפתור שאלות על שימור עבודה, יתרון מכני וחיכוך.'
  }
];

let segmentIdx = 0;
let isTyping = false;
let waitingForUser = false; // true when we paused at a question

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function toggleSend() {
  const v = document.getElementById('user-input').value.trim();
  document.getElementById('send-btn').classList.toggle('active', v.length > 0);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isTyping && document.getElementById('user-input').value.trim()) sendMessage();
  }
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function setInputEnabled(en) {
  const inp = document.getElementById('user-input');
  inp.disabled = !en;
  if (en) inp.focus();
  toggleSend();
}

// ─── ADD USER MESSAGE ────────────────────────────────────────────────────────
function addUserMessage(text) {
  const c = document.getElementById('msg-container');
  const d = document.createElement('div');
  d.className = 'message user-message';
  d.innerHTML = `<div class="msg-content"><div class="user-bubble">${escHtml(text)}</div></div><div class="msg-icon user">מ</div>`;
  c.appendChild(d);
  scrollToBottom();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── THINKING INDICATOR ──────────────────────────────────────────────────────
function showThinking() {
  const c = document.getElementById('msg-container');
  const d = document.createElement('div');
  d.className = 'message'; d.id = 'thinking-msg';
  d.innerHTML = `<div class="msg-icon gpt">${GPT_ICON}</div><div class="msg-content"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d); scrollToBottom();
}
function removeThinking() { const e = document.getElementById('thinking-msg'); if (e) e.remove(); }

// ─── RENDER MARKDOWN ─────────────────────────────────────────────────────────
function md(text) {
  let t = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/---/g, '<hr>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

// ─── TYPE TEXT ───────────────────────────────────────────────────────────────
function typeText(text, onDone) {
  const c = document.getElementById('msg-container');
  const wrap = document.createElement('div');
  wrap.className = 'message';
  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';
  contentEl.innerHTML = '<span class="cursor"></span>';
  wrap.innerHTML = `<div class="msg-icon gpt">${GPT_ICON}</div>`;
  wrap.appendChild(contentEl);
  c.appendChild(wrap);

  const lines = text.split('\n');
  let lIdx = 0, cIdx = 0, displayed = '';

  function tick() {
    if (lIdx >= lines.length) {
      contentEl.innerHTML = md(displayed);
      addMsgActions(wrap);
      if (onDone) onDone();
      return;
    }
    const line = lines[lIdx];
    if (cIdx < line.length) {
      displayed += line[cIdx++];
      contentEl.innerHTML = md(displayed) + '<span class="cursor"></span>';
      scrollToBottom();
      setTimeout(tick, line.startsWith('#') ? 16 : 11);
    } else {
      displayed += '\n'; lIdx++; cIdx = 0;
      setTimeout(tick, 18);
    }
  }
  tick();
}

// ─── SHOW QUESTION CARD ──────────────────────────────────────────────────────
function showQuestion(questionText) {
  const c = document.getElementById('msg-container');
  const wrap = document.createElement('div');
  wrap.className = 'message';
  wrap.innerHTML = `<div class="msg-icon gpt">${GPT_ICON}</div>
    <div class="msg-content">
      <div class="question-card">
        <div class="question-label">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>
          שאלה לחשיבה
        </div>
        <div class="question-text">${escHtml(questionText)}</div>
      </div>
    </div>`;
  c.appendChild(wrap);
  scrollToBottom();
}

// ─── SHOW ANSWER REVEAL ──────────────────────────────────────────────────────
function showAnswerReveal(answerMd, onDone) {
  const c = document.getElementById('msg-container');
  const wrap = document.createElement('div');
  wrap.className = 'message';
  wrap.innerHTML = `<div class="msg-icon gpt">${GPT_ICON}</div>
    <div class="msg-content"><div class="answer-reveal">${md(answerMd)}</div></div>`;
  c.appendChild(wrap);
  scrollToBottom();
  setTimeout(onDone, 400);
}

function addMsgActions(wrap) {
  const a = document.createElement('div');
  a.className = 'msg-actions';
  a.innerHTML = `<button><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> העתק</button>
    <button><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg></button>`;
  wrap.appendChild(a);
}

// ─── MAIN FLOW ───────────────────────────────────────────────────────────────
function runNextSegment() {
  if (segmentIdx >= SEGMENTS.length) {
    isTyping = false;
    setInputEnabled(false);
    return;
  }

  const seg = SEGMENTS[segmentIdx];
  segmentIdx++;

  if (seg.type === 'text') {
    typeText(seg.content, () => {
      // Small pause between segments
      setTimeout(runNextSegment, 500);
    });
  } else if (seg.type === 'question') {
    // Pause, show question, wait for user
    setTimeout(() => {
      showQuestion(seg.question);
      isTyping = false;
      waitingForUser = true;
      setInputEnabled(true);
      // Store the answer for when the user responds
      window._pendingAnswer = seg.answer;
    }, 400);
  }
}

// ─── SEND ────────────────────────────────────────────────────────────────────
function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; inp.style.height = 'auto';
  setInputEnabled(false);
  addUserMessage(text);

  if (waitingForUser) {
    waitingForUser = false;
    isTyping = true;
    const answer = window._pendingAnswer;
    window._pendingAnswer = null;

    // Show thinking, then reveal answer, then continue
    showThinking();
    setTimeout(() => {
      removeThinking();
      showAnswerReveal(answer, () => {
        setTimeout(runNextSegment, 600);
      });
    }, 900 + Math.random() * 600);

  } else {
    // Initial message — start the whole flow
    isTyping = true;
    showThinking();
    setTimeout(() => {
      removeThinking();
      runNextSegment();
    }, 1100 + Math.random() * 600);
  }
}

// Auto-start: show welcome hint after a beat
window.addEventListener('DOMContentLoaded', () => {
  setInputEnabled(true);
  document.getElementById('user-input').placeholder = 'שלח כל הודעה כדי להתחיל...';
});


</script>
