<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #212121;
    --sidebar: #171717;
    --input-bg: #2f2f2f;
    --border: #3f3f3f;
    --text: #ececec;
    --text-muted: #8e8ea0;
    --user-bubble: #2f2f2f;
    --accent: #10a37f;
    --hover: #2a2a2a;
  }

  body {
    font-family: "Söhne", ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 208px;
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    padding: 8px;
    flex-shrink: 0;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 6px;
    margin-bottom: 4px;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .sidebar-logo svg { width: 24px; height: 24px; }

  .new-chat-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .new-chat-btn:hover { background: var(--hover); color: var(--text); }

  .sidebar-section {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 12px 8px 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .chat-item {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s, color 0.15s;
  }
  .chat-item:hover { background: var(--hover); color: var(--text); }
  .chat-item.active { background: var(--hover); color: var(--text); }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .user-profile:hover { background: var(--hover); }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6af7, #4f8ef7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .user-name { font-size: 13.5px; font-weight: 500; }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 8px;
    transition: background 0.15s;
    user-select: none;
  }
  .model-selector:hover { background: var(--hover); }
  .model-selector svg { width: 14px; height: 14px; color: var(--text-muted); }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .message {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    margin-top: 2px;
  }

  .msg-icon.gpt {
    background: #fff;
    color: #000;
  }

  .msg-icon.user {
    background: linear-gradient(135deg, #7c6af7, #4f8ef7);
    color: #fff;
  }

  .msg-content {
    flex: 1;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  .msg-content.user-text {
    background: var(--user-bubble);
    padding: 10px 14px;
    border-radius: 16px 16px 4px 16px;
    display: inline-block;
    max-width: 80%;
  }

  .user-message { justify-content: flex-end; }
  .user-message .msg-icon { order: 2; }
  .user-message .msg-content { order: 1; text-align: right; }

  /* Markdown-like styling */
  .msg-content h1, .msg-content h2, .msg-content h3 {
    font-weight: 700;
    margin: 16px 0 8px;
    line-height: 1.4;
  }
  .msg-content h1 { font-size: 20px; }
  .msg-content h2 { font-size: 17px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .msg-content h3 { font-size: 15px; }

  .msg-content p { margin: 8px 0; }
  .msg-content ul, .msg-content ol { padding-right: 20px; margin: 8px 0; }
  .msg-content li { margin: 4px 0; }
  .msg-content strong { font-weight: 700; color: #fff; }
  .msg-content em { font-style: italic; }

  .msg-content .formula {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    margin: 8px 0;
    display: block;
    color: #e8d44d;
  }

  .msg-content .section-num {
    color: var(--accent);
    font-weight: 700;
  }

  .msg-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--text);
    margin-right: 2px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Action buttons under response */
  .msg-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .message:hover .msg-actions { opacity: 1; }
  .msg-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .msg-actions button:hover { background: var(--hover); color: var(--text); }

  /* INPUT AREA */
  .input-area {
    padding: 16px 24px 20px;
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: #555; }

  .input-wrap textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    line-height: 1.6;
    resize: none;
    max-height: 200px;
    min-height: 24px;
    direction: rtl;
  }

  .input-wrap textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    background: #fff;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
    opacity: 0.3;
  }
  .send-btn.active { opacity: 1; }
  .send-btn:hover.active { background: #e0e0e0; }
  .send-btn svg { width: 16px; height: 16px; color: #000; }

  .input-note {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 10px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Thinking dots */
  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .thinking span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <svg viewBox="0 0 41 41" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.31 10.079 10.079 0 00-9.612 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.31 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.813zM22.498 37.886a7.474 7.474 0 01-4.799-1.735c.061-.033.168-.091.237-.134l7.964-4.6a1.294 1.294 0 00.655-1.134V19.054l3.366 1.944a.12.12 0 01.066.092v9.299a7.505 7.505 0 01-7.49 7.496zM6.392 31.006a7.471 7.471 0 01-.894-5.023c.06.036.162.099.237.141l7.964 4.6a1.297 1.297 0 001.308 0l9.724-5.614v3.888a.12.12 0 01-.048.103l-8.051 4.649a7.504 7.504 0 01-10.24-2.744zM4.297 13.62A7.469 7.469 0 018.2 10.333c0 .068-.004.19-.004.274v9.201a1.294 1.294 0 00.654 1.132l9.723 5.614-3.366 1.944a.12.12 0 01-.114.012L7.044 23.86a7.504 7.504 0 01-2.747-10.24zm27.658 6.437l-9.724-5.615 3.367-1.943a.121.121 0 01.114-.012l8.048 4.648a7.498 7.498 0 01-1.158 13.528v-9.476a1.293 1.293 0 00-.647-1.13zm3.35-5.043c-.059-.037-.162-.099-.236-.141l-7.965-4.6a1.298 1.298 0 00-1.308 0l-9.723 5.614v-3.888a.12.12 0 01.048-.103l8.05-4.645a7.497 7.497 0 0111.135 7.763zm-21.063 6.929l-3.367-1.944a.12.12 0 01-.065-.092v-9.299a7.497 7.497 0 0112.293-5.756 6.94 6.94 0 00-.236.134l-7.965 4.6a1.294 1.294 0 00-.654 1.132l-.006 11.225zm1.829-3.943l4.33-2.501 4.332 2.498v4.996l-4.331 2.5-4.331-2.5V18z" fill="currentColor"/>

      AI Assistant
    </div>
    <button class="new-chat-btn" title="שיחה חדשה">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M12 4v16m8-8H4"/>
      </svg>
    </button>
  </div>

  <div class="chat-item active">מערכת גלגלות</div>

  <div class="sidebar-section">היום</div>
  <div class="chat-item">שאלה על מכונות פשוטות</div>
  <div class="chat-item">הסבר על כוח ועבודה</div>

  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="avatar">מ</div>
      <div class="user-name">משתמש</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="model-selector">
      AI Assistant
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>

  <div class="messages" id="messages">

  <div class="input-area">

      <textarea id="user-input" placeholder="שלח הודעה..." rows="1"
        onInput="autoResize(this); toggleSend();"
        onKeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>

      </button>

<script>
const FIXED_RESPONSE = `אני סוכן בינה מלאכותית שמטרתו לספק הסבר מושגי ברור, יחד עם הבנה מכנית ויכולת יישום לפתרון בעיות. נבחן את מערכת הגלגלות (Pulley System) משלושה שלבים:

**העיקרון המכני** | **הבנת המנגנון** | **יישום בפתרון בעיות**

---

## 1. העיקרון המכני

מערכת גלגלות היא מכונה פשוטה שמטרתה להקל על הרמת משאות.

המערכת יכולה לבצע שני דברים:
- לשנות את כיוון הכוח
- להקטין את גודל הכוח הדרוש

העיקרון הפיזיקלי המרכזי הוא **שימור העבודה**.

העבודה מוגדרת כך:

\`Work = Force × Distance\`

כאשר משתמשים במערכת גלגלות: אם הכוח קטן → המרחק שבו מושכים את החבל גדל.

המערכת לא יוצרת אנרגיה חדשה אלא מחלקת את המאמץ בצורה שונה.

---

## 2. הבנת המנגנון

העיקרון החשוב ביותר במערכות גלגלות הוא:

> המתיחות בחבל אידיאלי **זהה לכל אורכו**.

לכן כאשר משקל נתמך על ידי כמה מקטעי חבל, כל מקטע נושא חלק מהעומס.

**גלגלת קבועה**
- משנה רק את כיוון הכוח
- אינה מקטינה את הכוח הדרוש
- יתרון מכני: MA = 1

**גלגלת ניידת**
- המשקל נתמך על ידי שני חבלים
- יתרון מכני: MA = 2
- הכוח הדרוש קטן פי שניים

**מערכת גלגלות מורכבת**

היתרון המכני שווה למספר החבלים התומכים במשקל:

\`F = W / n\`

כאשר: W = המשקל, n = מספר החבלים התומכים במשקל

---

## 3. יישום בפתרון בעיות

**חישוב כוח**

אם משקל של 300 N מוחזק על ידי 5 חבלים:

\`F = 300 / 5 = 60 N\`

**עבודה**

העבודה תלויה רק במשקל ובגובה:

\`Work = Force × Distance\`

כל מערכות הגלגלות מבצעות אותה עבודה (בהזנחת חיכוך) כאשר מרימים אותו משקל לאותו גובה.

**אנרגיה פוטנציאלית**

כאשר מרימים גוף לגובה:

\`PE = mgh\`

אם המשקל זהה והגובה זהה — האנרגיה הפוטנציאלית זהה, גם אם השתמשו במערכות גלגלות שונות.

**חיכוך**

חיכוך מגדיל את הכוח הדרוש. לכן גלגלת משומנת היטב תדרוש פחות כוח מאשר גלגלת חלודה.`;

let isTyping = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function toggleSend() {
  const inp = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  btn.classList.toggle('active', inp.value.trim().length > 0);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isTyping && document.getElementById('user-input').value.trim()) sendMessage();
  }
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^> (.+)$/gm, '<blockquote style="border-right:3px solid #10a37f;padding-right:12px;margin:8px 0;color:#ccc">$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/`([^`]+)`/g, '<code class="formula">$1</code>')
    .replace(/---/g, '<hr>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function addUserMessage(text) {
  const container = document.getElementById('msg-container');
  const div = document.createElement('div');
  div.className = 'message user-message';
  div.innerHTML = `
    <div class="msg-content user-text">${text}</div>
    <div class="msg-icon user">מ</div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function addThinking() {
  const container = document.getElementById('msg-container');
  const div = document.createElement('div');
  div.className = 'message';
  div.id = 'thinking-msg';
  div.innerHTML = `
    <div class="msg-icon gpt">
      <svg width="16" height="16" viewBox="0 0 41 41" fill="none">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.31 10.079 10.079 0 00-9.612 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.31 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.813z" fill="currentColor"/>
      </svg>
    </div>
    <div class="msg-content"><div class="thinking"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function typeResponse() {
  removeThinking();
  const container = document.getElementById('msg-container');
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-icon gpt">
      <svg width="16" height="16" viewBox="0 0 41 41" fill="none">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.31 10.079 10.079 0 00-9.612 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.31 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.813z" fill="currentColor"/>
      </svg>
    </div>
    <div class="msg-content" id="typing-content"><span class="cursor"></span></div>
  `;
  container.appendChild(div);

  const contentEl = document.getElementById('typing-content');
  const lines = FIXED_RESPONSE.split('\n');
  let lineIdx = 0;
  let charIdx = 0;
  let displayed = '';

  function typeNext() {
    if (lineIdx >= lines.length) {
      // Done — render final markdown
      contentEl.innerHTML = '<p>' + renderMarkdown(displayed) + '</p>';
      contentEl.id = '';
      
      // Add action buttons
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = `
        <button title="העתק">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          העתק
        </button>
        <button title="אהבתי">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
        </button>
        <button title="לא אהבתי">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>
        </button>
      `;
      div.appendChild(actions);

      isTyping = false;
      document.getElementById('user-input').disabled = false;
      return;
    }

    const line = lines[lineIdx];
    if (charIdx < line.length) {
      displayed += line[charIdx];
      charIdx++;

      // Live partial render (simplified)
      const preview = displayed + (lineIdx < lines.length - 1 ? '' : '');
      contentEl.innerHTML = '<p>' + renderMarkdown(preview) + '</p><span class="cursor"></span>';
      scrollToBottom();

      // Vary speed
      const delay = line.startsWith('#') ? 18 : line.startsWith('`') ? 8 : 12;
      setTimeout(typeNext, delay);
    } else {
      displayed += '\n';
      lineIdx++;
      charIdx = 0;
      setTimeout(typeNext, 20);
    }
  }

  typeNext();
}



function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || isTyping) return;

  isTyping = true;
  inp.value = '';
  inp.style.height = 'auto';
  inp.disabled = true;
  toggleSend();

  addUserMessage(text);

  // Thinking delay: 1.2–2s
  const thinkDelay = 1200 + Math.random() * 800;
  addThinking();
  setTimeout(typeResponse, thinkDelay);
}
</script>
